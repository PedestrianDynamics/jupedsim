name: Build CI wheels

on:
  push:
    branches:
      - master
      - rls-*
  pull_request:
    branches:
      - master
      - rls-*
  release:
    types: [published]
    branches:
      - master
      - rls-*

permissions:
  contents: write

jobs:
  checks:
    name: Check Format
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: pip install ruff

    - name: Install clang-format-19
      run: |
        sudo add-apt-repository 'deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main'
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        sudo apt update
        sudo apt install clang-format-19

    - name: Run checks
      run: ./scripts/ci/check_format.sh

  tests:
    name: Run tests [${{ matrix.toolchain.cxx }}]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [ {cc: clang, cxx: clang++}, {cc: gcc, cxx: g++} ]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Build & test with ${{ matrix.toolchain.cc }} / ${{ matrix.toolchain.cxx }}
      env:
        CC: ${{ matrix.toolchain.cc }}
        CXX: ${{ matrix.toolchain.cxx }}
      run: ./scripts/ci/gh_build_linux.sh

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        name: Install Python
        with:
          python-version: 3.13

      - name: Install dependencies
        run: python -m pip install wheel build setuptools

      - name: Build sdist
        run: |
          python -m build -s

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-packages-sdist
          path: dist/jupedsim-*.tar.gz
          if-no-files-found: error

  build_wheels:
    name: Build wheels on ${{ matrix.os }} for ${{ matrix.cibw_archs }}
    runs-on: ${{ matrix.os }}
    env:
      CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
      CIBW_SKIP: "*musllinux*"
      MACOSX_DEPLOYMENT_TARGET: 12.05
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cibw_archs: "x86_64"
            cibw_build: "cp310-*"
          - os: ubuntu-latest
            cibw_archs: "x86_64"
            cibw_build: "cp311-*"
          - os: ubuntu-latest
            cibw_archs: "x86_64"
            cibw_build: "cp312-*"
          - os: ubuntu-latest
            cibw_archs: "x86_64"
            cibw_build: "cp313-*"
          - os: windows-latest
            cibw_archs: "auto64"
            cibw_build: "cp310-*"
          - os: windows-latest
            cibw_archs: "auto64"
            cibw_build: "cp311-*"
          - os: windows-latest
            cibw_archs: "auto64"
            cibw_build: "cp312-*"
          - os: windows-latest
            cibw_archs: "auto64"
            cibw_build: "cp313-*"
          - os: macos-13
            cibw_archs: "x86_64"
            cibw_build: "cp310-*"
          - os: macos-13
            cibw_archs: "x86_64"
            cibw_build: "cp311-*"
          - os: macos-13
            cibw_archs: "x86_64"
            cibw_build: "cp312-*"
          - os: macos-13
            cibw_archs: "x86_64"
            cibw_build: "cp313-*"
          - os: macos-13
            cibw_archs: "arm64"
            cibw_build: "cp310-*"
          - os: macos-13
            cibw_archs: "arm64"
            cibw_build: "cp311-*"
          - os: macos-13
            cibw_archs: "arm64"
            cibw_build: "cp312-*"
          - os: macos-13
            cibw_archs: "arm64"
            cibw_build: "cp313-*"

    steps:
      - uses: actions/checkout@v4
      - name: Build wheels for CPython ${{ matrix.cibw_build }} on ${{ matrix.cibw_archs }}
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

      - name: Extract Python Version (Unix/Mac)
        shell: bash
        run: echo "PYTHON_VERSION=$(echo ${{ matrix.cibw_build }} | cut -d'-' -f1)" >> $GITHUB_ENV
        if: runner.os != 'Windows'

      - name: Extract Python Version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pythonVersion = "${{ matrix.cibw_build }}" -split '-' | Select-Object -First 1
          $pythonVersion = $pythonVersion.Trim()
          echo "PYTHON_VERSION=$pythonVersion" | Out-File -Append -FilePath $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: python-packages-${{ matrix.os }}-${{ matrix.cibw_archs }}-${{ env.PYTHON_VERSION }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  test-wheels:
    name: Test wheel on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    needs: [ build_wheels ]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14, macos-15]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download packages
        uses: actions/Download-artifact@v4
        with:
          pattern: python-packages-*
          merge-multiple: true
          path: dist

      - name: Install wheel
        run: |
          python -m pip install -U pip
          python -m pip install --find-links=dist jupedsim

      - name: Check installation
        run: |
          python -c "import jupedsim; print(jupedsim.__version__)"

  test-sdist:
    name: Test sdist install
    needs: [ build_sdist ]
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Download packages
        uses: actions/Download-artifact@v4
        with:
          pattern: python-packages-*
          merge-multiple: true
          path: dist

      - name: Install wheel
        run: |
          python -m pip install -U pip
          python -m pip install dist/jupedsim*.tar.gz

      - name: Check installation
        run: |
          python -c "import jupedsim; print(jupedsim.__version__)"

  pypi-publish:
    needs: [test-wheels, test-sdist]
    if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      # retrieve your distributions here
      - name: Download packages
        uses: actions/Download-artifact@v4
        with:
          pattern: python-packages-*
          merge-multiple: true
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
